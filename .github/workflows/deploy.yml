name: Build and Deploy to FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: # 依然保留手动触发按钮

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # 这里将整个流水线拆分成了 7 个清晰的阶段（Steps）
    steps:
      # 阶段 1：准备环境 - 拉取代码
      - name: 📥 Stage 1 - Checkout Code
        uses: actions/checkout@v4

      # 阶段 2：准备环境 - 配置 Node 和 Yarn 缓存
      - name: ⚙️ Stage 2 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      # 阶段 3：安装依赖
      - name: 📦 Stage 3 - Install Dependencies
        run: yarn install --frozen-lockfile

      # 阶段 4：执行打包构建
      - name: 🏗️ Stage 4 - Build Project
        run: yarn build

      # 阶段 5：修改文件（重命名 index.html 为 meeting.html）
      - name: 📝 Stage 5 - Rename Entry File
        run: |
          echo "Renaming index.html to meeting.html..."
          mv dist/index.html dist/meeting.html
          echo "Checking dist folder contents:"
          ls -la dist/

      # 阶段 6：通过 FTP 传输文件到服务器
      - name: 🚀 Stage 6 - Transfer via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/

      # 阶段 7：部署完成通知（可选，帮你确认部署成功）
      - name: 🎉 Stage 7 - Deployment Complete
        run: echo "部署成功！ meeting.html 已上传至服务器。"
